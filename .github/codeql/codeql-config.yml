# CodeQL Configuration for qwen-code-webui
# Excludes false positives in demo/test files

name: "CodeQL Config"

paths-ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"

query-filters:
  - exclude:
      id: js/insecure-randomness
  - exclude:
      id: js/tainted-format-string
